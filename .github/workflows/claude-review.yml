name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Get existing review comments
        id: prior_comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PRIOR=$(gh pr view $PR_NUMBER --json comments \
            --jq '[.comments[] | select(.body | contains("**Claude Code Review**")) | .body] | join("\n\n---\n\n")')
          echo "$PRIOR" > prior_comments.txt
          if [ -z "$PRIOR" ]; then
            echo "has_prior=false" >> $GITHUB_OUTPUT
          else
            echo "has_prior=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt)
          PRIOR_COMMENTS=$(cat prior_comments.txt)

          if [ "${{ steps.prior_comments.outputs.has_prior }}" = "true" ]; then
            cat > prompt.txt <<'EOF'
          Review this PR diff. Only report NEW issues or issues from the list below that are STILL PRESENT in the current code. Do not re-report fixed issues.

          PREVIOUSLY REPORTED:
          EOF
            cat prior_comments.txt >> prompt.txt
            cat >> prompt.txt <<'EOF'

          CURRENT DIFF:
          EOF
            cat pr_diff.txt >> prompt.txt
          else
            cat > prompt.txt <<'EOF'
          Review this PR diff for bugs, security vulnerabilities, missing error handling, and architecture violations. Skip style issues the linter handles.

          EOF
            cat pr_diff.txt >> prompt.txt
          fi

          npx @anthropic-ai/claude-code -p "$(cat prompt.txt)" \
            --output-format json \
            --json-schema "$(cat .claude/review-schema.json)" \
            > review_output.json

      - name: Post findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SUMMARY=$(cat review_output.json | jq -r '.structured_output.summary')

          SUMMARY_BODY=$(printf '**Claude Code Review**\n\n%s' "$SUMMARY")
          gh pr comment "$PR_NUMBER" --body "$SUMMARY_BODY"

          cat review_output.json | jq -c '.structured_output.findings[]' | while read -r finding; do
            FILE=$(echo "$finding" | jq -r '.file')
            SEVERITY=$(echo "$finding" | jq -r '.severity')
            CATEGORY=$(echo "$finding" | jq -r '.category')
            DESCRIPTION=$(echo "$finding" | jq -r '.description')
            SUGGESTION=$(echo "$finding" | jq -r '.suggestion')
            LINE=$(echo "$finding" | jq -r '.line // "N/A"')

            FINDING_BODY=$(printf '**[%s] %s**, `%s` (line %s)\n\n%s\n\n**Suggested fix:** %s' \
              "$SEVERITY" "$CATEGORY" "$FILE" "$LINE" "$DESCRIPTION" "$SUGGESTION")
            gh pr comment "$PR_NUMBER" --body "$FINDING_BODY"
          done